                { id: 'npm-manager', title: 'NPM Package Manager', description: 'Using npm for skill installation; consider pnpm or yarn', impact: 'Dependency resolution', path: 'skills.install.nodeManager' },
                { id: 'tailscale-disabled', title: 'Tailscale Disabled', description: 'Tailscale mesh networking is disabled', impact: 'No secure remote access', path: 'gateway.tailscale.mode' },
            ]
        };

        // Safe DOM helpers
        function createElement(tag, className, textContent) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (textContent) el.textContent = textContent;
            return el;
        }

        function clearElement(el) {
            while (el.firstChild) {
                el.removeChild(el.firstChild);
            }
        }

        // Initialize UI
        function initUI() {
            renderSeverityFilters();
            renderRecTabs();
            renderEmptyState('risksContent', 'No configuration loaded', 'Import an OpenClaw configuration file to analyze');
            renderRecommendations();
            renderInitialExposureGraph();
        }

        // Render initial exposure graph (before config loaded)
        function renderInitialExposureGraph() {
            const container = document.getElementById('exposureNodes');
            if (!container) return;
            clearElement(container);

            const nodes = [
                { type: 'attacker', label: 'External Attacker', icon: '👤', status: 'exposed', statusText: 'Unknown' },
                { type: 'network', label: 'Network Layer', icon: '🌐', status: 'partial', statusText: 'Not Analyzed' },
                { type: 'gateway', label: 'Gateway / Auth', icon: '🚪', status: 'partial', statusText: 'Not Analyzed' },
                { type: 'agent', label: 'Agent / Tools', icon: '🤖', status: 'partial', statusText: 'Not Analyzed' },
                { type: 'data', label: 'Sensitive Data', icon: '🔐', status: 'partial', statusText: 'Not Analyzed' }
            ];

            nodes.forEach(function(node, index) {
                if (index > 0) {
                    const arrow = createElement('div', 'exposure-path');
                    arrow.textContent = '↓';
                    container.appendChild(arrow);
                }

                const nodeEl = createElement('div', 'exposure-node ' + node.type);
                const iconEl = createElement('div', 'exposure-node-icon', node.icon);
                const labelEl = createElement('div', 'exposure-node-label', node.label);
                const statusEl = createElement('div', 'exposure-node-status ' + node.status, node.statusText);

                nodeEl.appendChild(iconEl);
                nodeEl.appendChild(labelEl);
                nodeEl.appendChild(statusEl);
                container.appendChild(nodeEl);
            });
        }

        function renderSeverityFilters() {
            const container = document.getElementById('severityFilter');
            clearElement(container);

            const severities = ['critical', 'high', 'medium', 'low', 'info'];
            severities.forEach(severity => {
                const tag = createElement('span', 'severity-tag ' + severity);
                tag.textContent = severity.charAt(0).toUpperCase() + severity.slice(1);
                tag.dataset.severity = severity;
                tag.addEventListener('click', function() { toggleSeverity(severity); });
                container.appendChild(tag);
            });
        }

        function renderRecTabs() {
            const container = document.getElementById('recTabs');
            clearElement(container);

            const tabs = [
                { id: 'all', label: 'All (68)' },
                { id: 'network', label: 'Network' },
                { id: 'identity', label: 'Identity' },
                { id: 'sandbox', label: 'Sandbox' },
                { id: 'supply', label: 'Supply Chain' },
                { id: 'monitoring', label: 'Monitoring' }
            ];

            tabs.forEach(tab => {
                const btn = createElement('button', 'tab-btn' + (tab.id === activeRecTab ? ' active' : ''), tab.label);
                btn.addEventListener('click', function() {
                    activeRecTab = tab.id;
                    renderRecTabs();
                    renderRecommendations();
                });
                container.appendChild(btn);
            });
        }

        function renderEmptyState(containerId, title, message) {
            const container = document.getElementById(containerId);
            clearElement(container);

            const emptyState = createElement('div', 'empty-state');

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('stroke', 'currentColor');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-width', '1.5');
            path.setAttribute('d', 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z');
            svg.appendChild(path);
            emptyState.appendChild(svg);

            if (title) {
                const h3 = createElement('h3', null, title);
                emptyState.appendChild(h3);
            }

            const p = createElement('p', null, message);
            emptyState.appendChild(p);

            container.appendChild(emptyState);
        }

        function promptFileType(type) {
            currentFileType = type;
            document.getElementById('fileInput').click();
        }

        function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            let loadedCount = 0;
            const fileNames = [];

            files.forEach(function(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        let config;
                        // Handle JSONL files (session logs)
                        if (file.name.endsWith('.jsonl')) {
                            const lines = e.target.result.trim().split('\n');
                            config = { _type: 'session', entries: lines.map(l => JSON.parse(l)) };
                        } else {
                            config = JSON.parse(e.target.result);
                        }
                        config._fileType = currentFileType;
                        config._fileName = file.name;
                        loadedConfigs.push(config);
                        fileNames.push(file.name);

                        loadedCount++;
                        // When all files are loaded, analyze them
                        if (loadedCount === files.length) {
                            currentConfig = loadedConfigs[0]; // Keep first for compatibility
                            const totalFiles = loadedConfigs.length;
                            if (totalFiles === 1) {
                                document.getElementById('fileName').textContent = fileNames[0];
                                document.getElementById('fileCount').textContent = '';
                            } else {
                                document.getElementById('fileName').textContent = fileNames.slice(0, 2).join(', ') + (totalFiles > 2 ? '...' : '');
                                document.getElementById('fileCount').textContent = totalFiles + ' files';
                            }
                            document.getElementById('fileInfo').style.display = 'flex';
                            analyzeAllConfigs();
                        }
                    } catch (err) {
                        loadedCount++;
                        alert('Invalid file ' + file.name + ': ' + err.message);
                    }
                };
                reader.readAsText(file);
            });
            event.target.value = ''; // Reset for same file selection
        }

        function analyzeAllConfigs() {
            currentFindings = [];
            loadedConfigs.forEach(function(config) {
                analyzeConfig(config, true); // Don't render yet
            });
            renderFindings();
            updateStats();
            renderExposureGraph();
        }

        function clearLoadedFiles() {
            loadedConfigs = [];
            currentConfig = null;
            currentFindings = [];
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('fileName').textContent = '';
            document.getElementById('fileCount').textContent = '';
            renderEmptyState('risksContent', 'No configuration loaded', 'Import an OpenClaw configuration file to analyze');
            updateStats();
            renderInitialExposureGraph();
        }

        function analyzeConfig(config, skipRender) {
            // Only reset findings if not called from analyzeAllConfigs
            if (!skipRender) {
                currentFindings = [];
            }

            const checkSecrets = document.getElementById('checkSecrets').checked;
            const checkNetwork = document.getElementById('checkNetwork').checked;
            const checkAuth = document.getElementById('checkAuth').checked;
            const checkSandbox = document.getElementById('checkSandbox').checked;
            const checkChannels = document.getElementById('checkChannels').checked;
            const checkDiscovery = document.getElementById('checkDiscovery').checked;

            // ==================== CRITICAL RISKS ====================

            // Hardcoded tokens/secrets
            if (checkSecrets) {
                if (config.gateway?.auth?.token) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Hardcoded Authentication Token',
                        description: 'Authentication token is stored in plaintext. Should use environment variable OPENCLAW_GATEWAY_PASSWORD.',
                        impact: 'Account compromise, authentication bypass',
                        path: 'gateway.auth.token'
                    });
                }

                if (config.gateway?.auth?.password && !config.gateway.auth.password.startsWith('$')) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Hardcoded Gateway Password',
                        description: 'Password stored in plaintext instead of environment variable reference.',
                        impact: 'Credential theft, unauthorized access',
                        path: 'gateway.auth.password'
                    });
                }

                // Check for API keys in config
                const configStr = JSON.stringify(config);
                if (/sk-[a-zA-Z0-9]{20,}/.test(configStr)) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'API Key Detected in Config',
                        description: 'OpenAI/Anthropic API key pattern detected in configuration file.',
                        impact: 'API key theft, unauthorized usage',
                        path: 'Various'
                    });
                }
            }

            // Unauthenticated gateway
            if (checkAuth && config.gateway) {
                if (!config.gateway.auth || !config.gateway.auth.mode) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Unauthenticated Gateway',
                        description: 'Gateway exposed without authentication allows remote access to all agent capabilities.',
                        impact: 'Complete system takeover',
                        path: 'gateway.auth.mode'
                    });
                }

                if (config.gateway.controlUi?.dangerouslyDisableDeviceAuth === true) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Device Auth Disabled',
                        description: 'dangerouslyDisableDeviceAuth is enabled - severe security downgrade.',
                        impact: 'Authentication bypass',
                        path: 'gateway.controlUi.dangerouslyDisableDeviceAuth'
                    });
                }
            }

            // Public DM/Group exposure
            if (checkChannels && config.channels) {
                Object.keys(config.channels).forEach(channel => {
                    const channelConfig = config.channels[channel];
                    if (channelConfig.dmPolicy === 'open') {
                        currentFindings.push({
                            severity: 'critical',
                            title: 'Open DM Policy: ' + channel,
                            description: 'DM policy set to "open" allows strangers to interact with the bot.',
                            impact: 'Unauthorized access to tools and filesystem',
                            path: 'channels.' + channel + '.dmPolicy'
                        });
                    }
                });

                if (config.groupPolicy === 'open') {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Open Group Policy',
                        description: 'Group policy is set to "open" - anyone in groups can trigger the bot.',
                        impact: 'Unauthorized command execution',
                        path: 'groupPolicy'
                    });
                }
            }

            // ==================== HIGH RISKS ====================

            // Network binding
            if (checkNetwork && config.gateway) {
                if (config.gateway.bind && config.gateway.bind !== 'loopback') {
                    currentFindings.push({
                        severity: 'high',
                        title: 'Gateway Not Bound to Loopback',
                        description: 'Gateway is accessible beyond localhost (' + config.gateway.bind + '), potentially exposing the service to network attacks.',
                        impact: 'Remote exploitation',
                        path: 'gateway.bind'
                    });
                }

                if (config.gateway.nodes?.browser?.mode !== 'off') {
                    currentFindings.push({
                        severity: 'high',
                        title: 'Browser Control Enabled',
                        description: 'Browser proxy routing is enabled. If exposed, provides full browser profile access.',
                        impact: 'Full operator access to browser profile',
                        path: 'gateway.nodes.browser.mode'
                    });
                }
            }

            // Weak model selection
            if (checkSandbox && config.agents?.defaults?.model?.primary) {
                const model = config.agents.defaults.model.primary.toLowerCase();
                if (model.includes('3.5') || model.includes('mini') || model.includes('small')) {
                    currentFindings.push({
                        severity: 'high',
                        title: 'Weak Model Selection',
                        description: 'Using smaller/older model: ' + config.agents.defaults.model.primary + '. More susceptible to prompt injection.',
                        impact: 'Increased exploitation risk',
                        path: 'agents.defaults.model.primary'
                    });
                }
            }

            // Reverse proxy without trusted proxies
            if (checkNetwork && config.gateway?.mode === 'proxy' && !config.gateway.trustedProxies) {
                currentFindings.push({
                    severity: 'high',
                    title: 'Insecure Reverse Proxy Config',
                    description: 'Using proxy mode without configuring trustedProxies. Headers can be spoofed.',
                    impact: 'Authentication bypass via header spoofing',
                    path: 'gateway.trustedProxies'
                });
            }

            // ==================== MEDIUM RISKS ====================

            // Token-based auth (not critical but could be stronger)
            if (checkAuth && config.gateway?.auth?.mode === 'token') {
                currentFindings.push({
                    severity: 'medium',
                    title: 'Static Token Authentication',
                    description: 'Using static token authentication. Consider OAuth2 or mTLS for production.',
                    impact: 'Credential theft risk if token exposed',
                    path: 'gateway.auth.mode'
                });
            }

            // mDNS disclosure
            if (checkDiscovery && config.discovery?.mdns?.mode !== 'off' && config.discovery?.mdns?.mode !== 'minimal') {
                currentFindings.push({
                    severity: 'medium',
                    title: 'mDNS Information Disclosure',
                    description: 'Default mDNS broadcasts filesystem paths, SSH port, and hostname. Set to "minimal" or "off".',
                    impact: 'Network reconnaissance, path disclosure',
                    path: 'discovery.mdns.mode'
                });
            }

            // Group chat always-on
            if (checkChannels && config.groupChat && !config.groupChat.mentionPatterns) {
                currentFindings.push({
                    severity: 'medium',
                    title: 'Group Chat Always-On',
                    description: 'Bot responds in groups without requiring mention. Set groupChat.mentionPatterns.',
                    impact: 'Unintended command execution',
                    path: 'groupChat.mentionPatterns'
                });
            }

            // Cross-user context leakage
            if (checkChannels && config.session?.dmScope !== 'per-channel-peer') {
                currentFindings.push({
                    severity: 'medium',
                    title: 'Cross-User Context Leakage Risk',
                    description: 'session.dmScope not set to "per-channel-peer". Multiple users may share session context.',
                    impact: 'Privacy violation, data leakage',
                    path: 'session.dmScope'
                });
            }

            // Sandbox escape risk
            if (checkSandbox && config.tools?.elevated?.allowFrom) {
                const allowFrom = config.tools.elevated.allowFrom;
                if (allowFrom === '*' || (Array.isArray(allowFrom) && allowFrom.includes('*'))) {
                    currentFindings.push({
                        severity: 'medium',
                        title: 'Unrestricted Elevated Tools',
                        description: 'tools.elevated.allowFrom allows all sources. Should be restricted.',
                        impact: 'Sandbox bypass, host execution',
                        path: 'tools.elevated.allowFrom'
                    });
                }
            }

            // Workspace in user directory
            if (config.agents?.defaults?.workspace) {
                const workspace = config.agents.defaults.workspace;
                if (workspace.includes('/root') || workspace.includes('/home')) {
                    currentFindings.push({
                        severity: 'medium',
                        title: 'Workspace in User Directory',
                        description: 'Agent workspace is in a user home directory. Ensure proper permissions (700).',
                        impact: 'Sensitive file access',
                        path: 'agents.defaults.workspace'
                    });
                }
            }

            // Insecure auth fallback
            if (checkAuth && config.gateway?.controlUi?.allowInsecureAuth === true) {
                currentFindings.push({
                    severity: 'medium',
                    title: 'Insecure Auth Fallback Enabled',
                    description: 'allowInsecureAuth degrades to token-only authentication.',
                    impact: 'Weaker authentication',
                    path: 'gateway.controlUi.allowInsecureAuth'
                });
            }

            // ==================== JOBS.JSON SPECIFIC CHECKS ====================
            if (config._fileType === 'jobs' || config.jobs || config.scheduled) {
                // Check for scheduled jobs with shell access
                const jobs = config.jobs || config.scheduled || [];
                if (Array.isArray(jobs)) {
                    jobs.forEach(function(job, idx) {
                        if (job.command || job.exec || job.shell) {
                            currentFindings.push({
                                severity: 'high',
                                title: 'Scheduled Job with Shell Access',
                                description: 'Job #' + (idx + 1) + ' has shell/exec capabilities. Review command: ' + (job.command || job.exec || job.shell).substring(0, 50),
                                impact: 'Automated command execution',
                                path: 'jobs[' + idx + ']'
                            });
                        }
                        if (job.interval && parseInt(job.interval) < 60000) {
                            currentFindings.push({
                                severity: 'medium',
                                title: 'High-Frequency Scheduled Job',
                                description: 'Job #' + (idx + 1) + ' runs more frequently than every minute',
                                impact: 'Resource exhaustion, potential abuse',
                                path: 'jobs[' + idx + '].interval'
                            });
                        }
                    });
                }
            }

            // ==================== DEVICE-AUTH.JSON SPECIFIC CHECKS ====================
            if (config._fileType === 'device-auth' || config.deviceId || config.deviceToken) {
                // Device ID exposure
                if (config.deviceId) {
                    currentFindings.push({
                        severity: 'medium',
                        title: 'Device ID Stored',
                        description: 'Device identifier stored in configuration. Can be used for tracking.',
                        impact: 'Device fingerprinting',
                        path: 'deviceId'
                    });
                }
                // Device token (credential)
                if (config.deviceToken || config.device_token) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Device Authentication Token',
                        description: 'Device authentication token stored in plaintext. This is a credential!',
                        impact: 'Device impersonation, unauthorized access',
                        path: 'deviceToken'
                    });
                }
                // Refresh token
                if (config.refreshToken || config.refresh_token) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Refresh Token Stored',
                        description: 'Long-lived refresh token stored. Can be used to generate new access tokens.',
                        impact: 'Persistent unauthorized access',
                        path: 'refreshToken'
                    });
                }
                // Certificate or key material
                if (config.certificate || config.privateKey || config.private_key) {
                    currentFindings.push({
                        severity: 'critical',
                        title: 'Cryptographic Key Material',
                        description: 'Private key or certificate stored in device auth file.',
                        impact: 'Identity theft, signing capability',
                        path: 'privateKey/certificate'
                    });
                }
            }

            // ==================== LOW RISKS ====================

            // Tailscale disabled
            if (checkNetwork && config.gateway?.tailscale?.mode === 'off') {
                currentFindings.push({
                    severity: 'low',
                    title: 'Tailscale Disabled',
                    description: 'Tailscale mesh networking is disabled. Consider enabling for secure remote access.',
                    impact: 'No secure remote access option',
                    path: 'gateway.tailscale.mode'
                });
            }

            // Compaction mode
            if (config.agents?.defaults?.compaction?.mode === 'safeguard') {
                currentFindings.push({
                    severity: 'low',
                    title: 'Safeguard Compaction Mode',
                    description: 'Context compaction preserves more context but uses more resources.',
                    impact: 'Resource usage increase',
                    path: 'agents.defaults.compaction.mode'
                });
            }

            // NPM package manager
            if (config.skills?.install?.nodeManager === 'npm') {
                currentFindings.push({
                    severity: 'low',
                    title: 'NPM Package Manager',
                    description: 'Using npm for skill installation. Consider pnpm with strict mode.',
                    impact: 'Dependency resolution security',
                    path: 'skills.install.nodeManager'
                });
            }

            // No plugin allowlist
            if (checkSandbox && !config.plugins?.allow) {
                currentFindings.push({
                    severity: 'low',
                    title: 'No Plugin Allowlist',
                    description: 'No explicit plugin allowlist configured. Recommend setting plugins.allow.',
                    impact: 'Uncontrolled plugin installation',
                    path: 'plugins.allow'
                });
            }

            // No log redaction patterns
            if (config.logging && !config.logging.redactPatterns) {
                currentFindings.push({
                    severity: 'low',
                    title: 'No Custom Log Redaction',
                    description: 'No custom redaction patterns for logs. Consider adding token/URL patterns.',
                    impact: 'Potential sensitive data in logs',
                    path: 'logging.redactPatterns'
                });
            }

            // ==================== INFO (Positive findings) ====================

            // Good: Loopback binding
            if (checkNetwork && config.gateway?.bind === 'loopback') {
                currentFindings.push({
                    severity: 'info',
                    title: 'Gateway Bound to Loopback',
                    description: 'Gateway is correctly restricted to localhost only.',
                    path: 'gateway.bind'
                });
            }

            // Good: Sandbox enabled
            if (checkSandbox && config.agents?.defaults?.sandbox?.mode === 'all') {
                currentFindings.push({
                    severity: 'info',
                    title: 'Full Sandboxing Enabled',
                    description: 'Agent sandboxing is enabled for all operations.',
                    path: 'agents.defaults.sandbox.mode'
                });
            }

            // Model info
            if (config.agents?.defaults?.model?.primary) {
                currentFindings.push({
                    severity: 'info',
                    title: 'Model Configuration',
                    description: 'Primary model: ' + config.agents.defaults.model.primary,
                    path: 'agents.defaults.model.primary'
                });
            }

            // Version info
            if (config.meta?.lastTouchedVersion) {
                currentFindings.push({
                    severity: 'info',
                    title: 'Configuration Version' + (config._fileName ? ' (' + config._fileName + ')' : ''),
                    description: 'Config last modified by version ' + config.meta.lastTouchedVersion,
                    path: 'meta.lastTouchedVersion'
                });
            }

            // Only render if not called from analyzeAllConfigs
            if (!skipRender) {
                renderFindings();
                updateStats();
                renderExposureGraph();
            }
        }

        // Render exposure graph showing attack path
        function renderExposureGraph() {
            const container = document.getElementById('exposureNodes');
            if (!container) return;
            clearElement(container);

            // Determine exposure status based on findings
            const hasUnauthGateway = currentFindings.some(f => f.title.includes('Unauthenticated'));
            const hasOpenDM = currentFindings.some(f => f.title.includes('Open DM') || f.title.includes('Open Group'));
            const hasHardcodedToken = currentFindings.some(f => f.title.includes('Hardcoded'));
            const hasNetworkExposure = currentFindings.some(f => f.title.includes('Not Bound to Loopback'));
            const hasSandboxIssue = currentFindings.some(f => f.title.includes('Sandbox') || f.title.includes('Elevated'));
            const isLoopback = currentFindings.some(f => f.title === 'Gateway Bound to Loopback');

            const exposureData = [
                {
                    type: 'attacker',
                    label: 'External Attacker',
                    icon: '👤',
                    status: 'exposed',
                    statusText: 'Active Threat'
                },
                {
                    type: 'network',
                    label: 'Network Layer',
                    icon: '🌐',
                    status: hasNetworkExposure ? 'exposed' : (isLoopback ? 'protected' : 'partial'),
                    statusText: hasNetworkExposure ? 'Exposed' : (isLoopback ? 'Loopback Only' : 'Check Config')
                },
                {
                    type: 'gateway',
                    label: 'Gateway / Auth',
                    icon: '🚪',
                    status: hasUnauthGateway || hasHardcodedToken ? 'exposed' : (hasOpenDM ? 'partial' : 'protected'),
                    statusText: hasUnauthGateway ? 'No Auth!' : (hasHardcodedToken ? 'Token Exposed' : (hasOpenDM ? 'Open Policy' : 'Protected'))
                },
                {
                    type: 'agent',
                    label: 'Agent / Tools',
                    icon: '🤖',
                    status: hasSandboxIssue ? 'partial' : 'protected',
                    statusText: hasSandboxIssue ? 'Sandbox Risk' : 'Sandboxed'
                },
                {
                    type: 'data',
                    label: 'Sensitive Data',
                    icon: '🔐',
                    status: (hasHardcodedToken || hasUnauthGateway || hasNetworkExposure) ? 'exposed' : 'protected',
                    statusText: (hasHardcodedToken || hasUnauthGateway) ? 'At Risk' : 'Protected'
                }
            ];

            exposureData.forEach(function(node, index) {
                // Add arrow between nodes
                if (index > 0) {
                    const arrow = createElement('div', 'exposure-path');
                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svg.setAttribute('fill', 'none');
                    svg.setAttribute('viewBox', '0 0 24 24');
                    svg.setAttribute('stroke', 'currentColor');
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('stroke-linecap', 'round');
                    path.setAttribute('stroke-linejoin', 'round');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('d', 'M19 14l-7 7m0 0l-7-7m7 7V3');
                    svg.appendChild(path);
                    arrow.appendChild(svg);
                    container.appendChild(arrow);
                }

                const nodeEl = createElement('div', 'exposure-node ' + node.type);

                const iconEl = createElement('div', 'exposure-node-icon', node.icon);
                const labelEl = createElement('div', 'exposure-node-label', node.label);
                const statusEl = createElement('div', 'exposure-node-status ' + node.status, node.statusText);

                nodeEl.appendChild(iconEl);
                nodeEl.appendChild(labelEl);
                nodeEl.appendChild(statusEl);
                container.appendChild(nodeEl);
            });
        }

        function renderFindings() {
            const container = document.getElementById('risksContent');
            clearElement(container);

            const filteredFindings = currentFindings.filter(function(f) {
                return activeSeverities.has(f.severity);
            });

            document.getElementById('riskCount').textContent = filteredFindings.length;

            if (filteredFindings.length === 0) {
                if (currentConfig) {
                    renderEmptyState('risksContent', 'No findings match filters', 'Adjust severity filters to see results');
                } else {
                    renderEmptyState('risksContent', 'No configuration loaded', 'Import an OpenClaw configuration file to analyze');
                }
                return;
            }

            const severityOrder = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };
            filteredFindings.sort(function(a, b) {
                return severityOrder[a.severity] - severityOrder[b.severity];
            });

            filteredFindings.forEach(function(finding) {
                const item = createElement('div', 'risk-item ' + finding.severity);

                const icon = createElement('div', 'risk-icon');
                icon.textContent = (finding.severity === 'low' || finding.severity === 'info') ? 'i' : '!';

                const details = createElement('div', 'risk-details');

                const title = createElement('div', 'risk-title', finding.title);
                const description = createElement('div', 'risk-description', finding.description);
                const path = createElement('div', 'risk-path', finding.path);

                details.appendChild(title);
                details.appendChild(description);
                if (finding.impact) {
                    const impact = createElement('div', 'risk-impact', 'Impact: ' + finding.impact);
                    details.appendChild(impact);
                }
                details.appendChild(path);

                item.appendChild(icon);
                item.appendChild(details);

                container.appendChild(item);
            });
        }

        function renderRecommendations() {
            const container = document.getElementById('recommendationsContent');
            clearElement(container);

            let recommendations = [];

            if (activeRecTab === 'all') {
                Object.keys(RECOMMENDATIONS).forEach(function(key) {
                    RECOMMENDATIONS[key].forEach(function(rec) {
                        recommendations.push({ ...rec, priority: key });
                    });
                });
            } else {
                recommendations = RECOMMENDATIONS[activeRecTab].map(function(rec) {
                    return { ...rec, priority: activeRecTab };
                });
            }

            recommendations.forEach(function(rec, index) {
                const item = createElement('div', 'recommendation-item tooltip-container');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'rec-checkbox';
                checkbox.addEventListener('change', function() {
                    item.classList.toggle('completed', this.checked);
                });

                const priorityClasses = {
                    network: 'immediate',
                    identity: 'immediate',
                    sandbox: 'ongoing',
                    supply: 'ongoing',
                    monitoring: 'best-practice'
                };
                const priorityLabels = {
                    network: 'NET',
                    identity: 'ID',
                    sandbox: 'EXEC',
                    supply: 'SUPPLY',
                    monitoring: 'MON'
                };
                const priorityLabel = createElement('span', 'rec-priority ' + (priorityClasses[rec.priority] || 'best-practice'));
                priorityLabel.textContent = priorityLabels[rec.priority] || rec.priority.toUpperCase().slice(0,4);

                const textDiv = createElement('div', 'rec-text');
                const idSpan = rec.id ? '#' + rec.id + ' ' : '';
                textDiv.textContent = idSpan + rec.text;

                const category = createElement('span', 'rec-category', rec.category);
                textDiv.appendChild(category);

                // Add rich tooltip with instruction, risk, difficulty, and tags
                if (rec.instruction) {
                    const tooltip = createElement('div', 'tooltip');

                    // Header with icon
                    const header = createElement('div', 'tooltip-header');
                    const categoryIcons = {
                        network: { icon: '🌐', class: 'network' },
                        identity: { icon: '🔑', class: 'identity' },
                        sandbox: { icon: '📦', class: 'sandbox' },
                        supply: { icon: '🔗', class: 'supply' },
                        monitoring: { icon: '👁️', class: 'monitoring' }
                    };
                    const catInfo = categoryIcons[rec.priority] || { icon: '⚙️', class: 'default' };
                    const iconEl = createElement('span', 'tooltip-icon ' + catInfo.class, catInfo.icon);
                    const titleEl = createElement('span', 'tooltip-title', rec.category + ' - #' + rec.id);
                    header.appendChild(iconEl);
                    header.appendChild(titleEl);
                    tooltip.appendChild(header);

                    // Risk warning if available
                    if (rec.risk) {
                        const riskEl = createElement('div', 'tooltip-risk');
                        const riskIcon = createElement('span', null, '⚠️ ');
                        const riskText = document.createTextNode(rec.risk);
                        riskEl.appendChild(riskIcon);
                        riskEl.appendChild(riskText);
                        tooltip.appendChild(riskEl);
                    }

                    // Implementation instruction
                    const instructionLabel = createElement('div', 'tooltip-label', 'How to implement:');
                    tooltip.appendChild(instructionLabel);
                    const instructionText = createElement('div', 'tooltip-instruction', rec.instruction);
                    tooltip.appendChild(instructionText);

                    // Code example
                    if (rec.code) {
                        const tooltipCode = createElement('code', 'tooltip-code', rec.code);
                        tooltip.appendChild(tooltipCode);
                    }

                    // Tags section (difficulty + other tags)
                    if (rec.difficulty || rec.tags) {
                        const tagsEl = createElement('div', 'tooltip-tags');

                        // Difficulty tag
                        if (rec.difficulty) {
                            const difficultyColors = {
                                easy: 'difficulty-easy',
                                medium: 'difficulty-medium',
                                hard: 'difficulty-hard'
                            };
                            const diffTag = createElement('span', 'tooltip-tag ' + (difficultyColors[rec.difficulty] || ''));
                            diffTag.textContent = rec.difficulty.charAt(0).toUpperCase() + rec.difficulty.slice(1);
                            tagsEl.appendChild(diffTag);
                        }

                        // Other tags
                        if (rec.tags && rec.tags.length > 0) {
                            rec.tags.forEach(function(tag) {
                                const tagEl = createElement('span', 'tooltip-tag');
                                if (tag === 'Critical') tagEl.className += ' tag-critical';
                                else if (tag === 'Recommended' || tag === 'Quick Win') tagEl.className += ' tag-recommended';
                                else if (tag === 'Enterprise' || tag === 'Advanced') tagEl.className += ' tag-enterprise';
                                tagEl.textContent = tag;
                                tagsEl.appendChild(tagEl);
                            });
                        }

                        tooltip.appendChild(tagsEl);
                    }

                    item.appendChild(tooltip);
                }

                item.appendChild(checkbox);
                item.appendChild(priorityLabel);
                item.appendChild(textDiv);
                container.appendChild(item);
            });
        }

        function updateStats() {
            const counts = { critical: 0, high: 0, medium: 0, low: 0 };
            currentFindings.forEach(function(f) {
                if (counts.hasOwnProperty(f.severity)) {
                    counts[f.severity]++;
                }
            });

            document.getElementById('criticalCount').textContent = counts.critical;
            document.getElementById('highCount').textContent = counts.high;
            document.getElementById('mediumCount').textContent = counts.medium;
            document.getElementById('lowCount').textContent = counts.low;
        }

        function toggleSeverity(severity) {
            const tag = document.querySelector('.severity-tag[data-severity="' + severity + '"]');
            if (activeSeverities.has(severity)) {
                activeSeverities.delete(severity);
                tag.classList.add('inactive');
            } else {
                activeSeverities.add(severity);
                tag.classList.remove('inactive');
            }
            renderFindings();
        }

        function reanalyze() {
            if (currentConfig) {
                analyzeConfig(currentConfig);
            }
        }

        function exportReport() {
            if (currentFindings.length === 0) {
                alert('No findings to export. Load a configuration first.');
                return;
            }

            let report = '# OpenClaw Security Analysis Report\n';
            report += 'Generated: ' + new Date().toISOString() + '\n\n';

            const severityOrder = ['critical', 'high', 'medium', 'low', 'info'];
            severityOrder.forEach(function(sev) {
                const findings = currentFindings.filter(function(f) { return f.severity === sev; });
                if (findings.length > 0) {
                    report += '## ' + sev.toUpperCase() + ' (' + findings.length + ')\n\n';
                    findings.forEach(function(f) {
                        report += '### ' + f.title + '\n';
                        report += '- **Path:** `' + f.path + '`\n';
                        report += '- **Description:** ' + f.description + '\n';
                        if (f.impact) report += '- **Impact:** ' + f.impact + '\n';
                        report += '\n';
                    });
                }
            });

            const blob = new Blob([report], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'openclaw-security-report-' + new Date().toISOString().split('T')[0] + '.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initUI);

        // ==================== PROTECTION MEASURES ====================

        // Disable keyboard shortcuts for dev tools and view source
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I / Cmd+Option+I (Dev Tools)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J / Cmd+Option+J (Console)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
            // Ctrl+U / Cmd+U (View Source)
            if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            // Ctrl+S / Cmd+S (Save)
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C (Inspect Element)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                return false;
            }
        });

        // Detect DevTools opening (basic detection)
        (function() {
            const threshold = 160;
            const devtoolsCheck = function() {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                if (widthThreshold || heightThreshold) {
                    document.body.style.opacity = '0.1';
                } else {
                    document.body.style.opacity = '1';
                }
            };
            setInterval(devtoolsCheck, 1000);
        })();

        // Disable print
        window.addEventListener('beforeprint', function(e) {
            e.preventDefault();
            return false;
        });

        // Console warning
        console.log('%c STOP!', 'color: red; font-size: 50px; font-weight: bold;');
        console.log('%c This tool is for authorized security analysis only.', 'color: #f97316; font-size: 16px;');
        console.log('%c Unauthorized access or modification is prohibited.', 'color: #8b949e; font-size: 14px;');
    </script>
</body>
</html>
